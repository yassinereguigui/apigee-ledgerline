name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: apigeelint
        run: |
          npm install -g apigeelint@2.85.1
          for d in proxies/*/apiproxy sharedflows/*/sharedflowbundle; do 
            [ -e "$d" ] || continue
            apigeelint -s "$d" -f table; 
          done

  deploy:
    needs: lint
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      ENV: eval
      ORG: ledgerline-502414
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: auth
        name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - name: Install apigeecli
        run: |
          curl -s https://raw.githubusercontent.com/apigee/apigeecli/main/downloadLatest.sh | bash
          echo "$HOME/.apigeecli/bin" >> "$GITHUB_PATH"

      - name: Deploy changed artifacts
        run: |
          # Manual run forces a deploy of everything (sharedflows then proxies)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run -> Deploying all artifacts"
            bash scripts/deploy.sh "$ENV"
            exit 0
          fi

          # Desired-state config (target servers, products) — idempotent, apply every run
          bash scripts/deploy.sh "$ENV" config

          base="${{ github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base="$(git rev-parse HEAD^)"
          fi

          changed_sf=$(git diff --name-only "$base" "$GITHUB_SHA" -- sharedflows | cut -d/ -f2 | sort -u)
          changed_proxy=$(git diff --name-only "$base" "$GITHUB_SHA" -- proxies | cut -d/ -f2 | sort -u)

          if [ -z "$changed_sf" ] && [ -z "$changed_proxy" ]; then
            echo "No sharedflow or proxy changes -> nothing to deploy"
            exit 0
          fi

          for a in $changed_sf $changed_proxy; do
            echo "Deploying: $a"
            bash scripts/deploy.sh "$ENV" "$a"
          done
